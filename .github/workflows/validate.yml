name: Validate

on:
  push:
  pull_request:

jobs:
  yaml:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate YAML files
        run: |
          ruby -e 'require "yaml"; YAML.load_file("action.yml"); YAML.load_file("prompts/general.prompt.yml"); YAML.load_file("examples/issue-analyze.yml"); YAML.load_file("examples/label-map.yml"); YAML.load_file(".github/issue-ai-label-map.yml"); YAML.load_file(".github/workflows/issue.yml"); puts "yaml ok"'

      - name: Validate TOML example
        run: |
          ruby - <<'RUBY'
          content = File.read("examples/label-map.toml")
          parsed = {}

          content.each_line.with_index(1) do |line, line_number|
            stripped = line.sub(/\s+#.*\z/, '').strip
            next if stripped.empty?
            abort("TOML tables are not supported in examples/label-map.toml:#{line_number}") if stripped.start_with?('[')

            match = stripped.match(/\A([A-Za-z0-9._-]+)\s*=\s*(.+)\z/)
            abort("Invalid TOML example entry at line #{line_number}") unless match

            parsed[match[1]] = match[2]
          end

          abort('TOML example is empty') if parsed.empty?
          puts 'toml ok'
          RUBY
